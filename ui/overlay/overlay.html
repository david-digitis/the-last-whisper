<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="backdrop" class="backdrop">
    <div id="panel" class="panel">

      <div class="panel-header">
        <span class="panel-title">The Last Whisper</span>
        <button class="close-btn" id="close-btn">&times;</button>
      </div>

      <div id="source-text" class="source-text"></div>

      <div id="actions" class="actions-row">
        <!-- Populated dynamically -->
      </div>

      <div id="result-area" class="result-area hidden">
        <div id="result-text" class="result-text"></div>
        <div class="result-buttons">
          <button class="btn-secondary" id="copy-btn">Copy</button>
          <button class="btn-primary" id="insert-btn">Paste</button>
        </div>
      </div>

      <div id="loading" class="loading hidden">Gemini...</div>

    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
